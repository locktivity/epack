name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Run tests (core)
        run: go test -race -v ./...

      - name: Run tests (full)
        run: go test -race -v -tags components ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: golangci-lint (core)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.9.0

      - name: golangci-lint (components)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.9.0
          args: --build-tags components

      - name: Verify import boundary
        run: make lint-boundary

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: core
            tags: ""
          - name: full
            tags: components
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Build (${{ matrix.name }})
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            go build -tags ${{ matrix.tags }} ./cmd/epack
          else
            go build ./cmd/epack
          fi

      - name: Verify binary runs
        run: ./epack version

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Run fuzz tests (brief)
        run: ./scripts/fuzz.sh 10s
